<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MacroPW – Log In</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('start_page') }}">MacroPW</a>
    </div>
  </nav>

  <!-- Inloggningsformulär -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="{{ url_for('start_page') }}" class="text-muted-soft back-link d-inline-block mb-3">← Back</a>
      <h2 class="auth-title">Log In</h2>
      <p class="auth-subtitle">Welcome back!</p>

      <!-- Felmeddelanden från servern -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Inloggningsformulär -->
      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary-blue w-100 py-3">Log In</button>
      </form>

      <!-- Länk till registrering -->
      <p class="text-center text-muted-soft mt-3 mb-0 small">
        Don't have an account? <a href="{{ url_for('register') }}" class="inline-link">Sign up</a>
      </p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    setTimeout(function () {
      document.querySelectorAll('.alert').forEach(function (el) {
        el.style.display = 'none';
      });
    }, 3000);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Lunch - MacroPW</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>

  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}">MacroPW</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav">
            <a class="nav-link" href="{{ url_for('index') }}">Start</a>
            <a class="nav-link active" href="{{ url_for('meals') }}">Meal log</a>
            <a class="nav-link" href="{{ url_for('add_workout') }}">Workouts</a>
            <a class="nav-link" href="{{ url_for('statistics') }}">Statistics</a>
          </div>
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('profile') }}">Profile</a>
            <a class="nav-link" href="{{ url_for('logout') }}">Log Out</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Huvudinnehåll -->
    <div class="page-wrapper">
      <div class="container mt-4">
        <div class="content-card">
          <div class="section-title">Meal log</div>
          <h1 class="page-title">Add Lunch</h1>
          <p class="page-subtitle">Search and add foods to your lunch.</p>

          <!-- Formulär för att lägga till lunch -->
          <form class="form-card mt-4">
            <div class="mb-3">
              <label for="foodSearch" class="form-label">Search food</label>
              <input type="text" class="form-control" id="foodSearch" placeholder="Example: chicken, rice, avocado">
            </div>

            <div class="mb-3">
              <label for="mealName" class="form-label">Meal name</label>
              <input type="text" class="form-control" id="mealName" value="Lunch">
            </div>

            <div class="mb-3">
              <label for="amount" class="form-label">Amount</label>
              <input type="text" class="form-control" id="amount" placeholder="Example: 200 g">
            </div>

            <div class="mb-3">
              <label for="notes" class="form-label">Notes</label>
              <textarea class="form-control" id="notes" placeholder="Optional notes"></textarea>
            </div>

            <!-- Knappar för att gå tillbaka eller spara -->
            <div class="action-row">
              <a href="{{ url_for('index') }}" class="btn btn-outline-blue">Back</a>
              <button type="submit" class="btn btn-primary-blue">Save Lunch</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-muted py-3 mt-5">
      <div class="container">
        <p class="mb-0">&copy; 2026 MacroPW INC. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>

</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MacroPW – Add Lunch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='add_lunch.css') }}">
</head>
<body>

  <div class="app-shell">
    <div class="phone-frame">

      <section class="lunch-hero">
        <div class="hero-inner">
          <h1 class="page-title">Add Lunch</h1>

          <div class="search-row">
            <div class="search-box">
              <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M20 20l-3.5-3.5"></path>
              </svg>

              <input
                type="text"
                class="search-input"
                placeholder="Search for food"
                aria-label="Search for food"
              >
            </div>

            <button class="menu-btn" type="button" aria-label="Open menu">
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
        </div>
      </section>

      <section class="quick-actions">
        <a href="#" class="action-pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"></path>
          </svg>
          <span>Quick log</span>
        </a>

        <a href="{{ url_for('foods') }}" class="action-pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 3h-4a2 2 0 0 0-2 2v14l4-2 4 2V5a2 2 0 0 0-2-2z"></path>
            <path d="M19 21V8"></path>
            <path d="M16.5 11.5h5"></path>
          </svg>
          <span>Add food</span>
        </a>
      </section>

      <section class="content-space">
        <!-- Här fyller vi på i nästa steg -->
      </section>

    </div>
  </div>

</body>
</html>

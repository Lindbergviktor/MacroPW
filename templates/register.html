<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MacroPW – New User</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('start_page') }}">MacroPW</a>
    </div>
  </nav>

  <!-- Registreringsformulär -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="{{ url_for('start_page') }}" class="text-muted-soft d-inline-block mb-3" style="font-size: 0.9rem;">← Back</a>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Start tracking your macros today.</p>

      <!-- Felmeddelanden från servern -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Formulärfält för ny användare -->
      <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" name="gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <!-- Valfria fält för beräkning av kaloribudget -->
        <div class="mb-3">
          <label class="form-label">Height (cm)</label>
          <input type="number" class="form-control" name="height">
        </div>
        <div class="mb-3">
          <label class="form-label">Weight (kg)</label>
          <input type="number" step="0.1" class="form-control" name="weight">
        </div>
        <div class="mb-3">
          <label class="form-label">Activity level</label>
          <select class="form-select" name="activity_level">
            <option value="" disabled selected>Select activity level</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary-green w-100" style="padding: 0.75rem;">Create Account</button>
      </form>

      <!-- Länk tillbaka till inloggning -->
      <p class="text-center mt-3 mb-0" style="font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--green-dark); font-weight: 600;">Log in</a>
      </p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

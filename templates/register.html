<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MacroPW – New User</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('start_page') }}">MacroPW</a>
    </div>
  </nav>

  <!-- Registreringsformulär -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="{{ url_for('start_page') }}" class="text-muted-soft d-inline-block mb-3" style="font-size: 0.9rem;">← Back</a>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Start tracking your macros today.</p>

      <!-- Felmeddelanden från servern -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Formulärfält för ny användare -->
      <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" name="gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <!-- Obligatoriska fält för beräkning av kaloribudget -->
        <div class="mb-3">
          <label class="form-label">Height (cm)</label>
          <input type="number" class="form-control" name="height" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Weight (kg)</label>
          <input type="number" step="0.1" class="form-control" name="weight" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Activity level</label>
          <select class="form-select" name="activity_level" required>
            <option value="" disabled selected>Select activity level</option>
            <option value="sedentary">Sedentary — desk job, little movement</option>
            <option value="lightly_active">Lightly active — exercise 1–3 days/week</option>
            <option value="moderately_active">Moderately active — exercise 3–5 days/week</option>
            <option value="very_active">Very active — hard exercise 6–7 days/week</option>
            <option value="extra_active">Extra active — physical job + daily exercise</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Date of birth</label>
          <input type="date" class="form-control" name="birthdate" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Goal</label>
          <select class="form-select" name="weight_goal" required>
            <option value="" disabled selected>Select goal</option>
            <option value="loss">Lose weight</option>
            <option value="maintain">Maintain weight</option>
            <option value="gain">Gain weight</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary-blue w-100" style="padding: 0.75rem;">Create Account</button>
      </form>

      <!-- Länk tillbaka till inloggning -->
      <p class="text-center mt-3 mb-0" style="font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--blue-dark); font-weight: 600;">Log in</a>
      </p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- JS för kalender i formuläret-->
  <script>
    flatpickr("input[name='birthdate']", {
      dateFormat: "Y-m-d",
      maxDate: "today",
      defaultDate: "2000-01-01",
      disableMobile: true
    });
</script>
<script>
  setTimeout(function () {
    document.querySelectorAll('.alert').forEach(function (el) {
      el.style.display = 'none';
    });
  }, 3000);
</script>
</body>
</html>
